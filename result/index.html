        document.getElementById("sillyForm").addEventListener("submit", function (event) {
            event.preventDefault();
            let name = document.getElementById("name").value;
            name = name.trim();
            name = name.toLowerCase();
            name = name.charAt(0).toUpperCase() + name.slice(1);
            if (name.length === 0) {
                document.getElementById("error").innerHTML = "<font color='red'>Enter a name first!</font>";
            } else {
                try {
                    let score = "Score: " + data[name]["score"]
                    let correct = "Correct: " + data[name]["correct"]
                    let wrong = "Wrong: " + data[name]["wrong"]
                    let unanswered = "Unanswered: " + data[name]["unanswered"]
                    let auto = "Auto: " + data[name]["auto"]
                    let wrong_list_str = "Wrong List: ";
                    for (let i = 0; i < data[name]["wrong_list"].length; i++) {
                        wrong_list_str += data[name]["wrong_list"][i];
                        if (i < data[name]["wrong_list"].length - 1) {
                            wrong_list_str += ", ";
                        }
                    }
                    let unanswered_list_str = "Unanswered List: ";
                    for (let i = 0; i < data[name]["unanswered_list"].length; i++) {
                        unanswered_list_str += data[name]["unanswered_list"][i];
                        if (i < data[name]["unanswered_list"].length - 1) {
                            unanswered_list_str += ", ";
                        }
                    }
                    let auto_list_str = "Auto List: ";
                    if (data[name]["auto_list"].length === 0) {
                        auto_list_str += "<empty>";
                    }
                    for (let i = 0; i < data[name]["auto_list"].length; i++) {
                        auto_list_str += data[name]["auto_list"][i];
                        if (i < data[name]["auto_list"].length - 1) {
                            auto_list_str += ", ";
                        }
                    }
                    document.getElementById("error").innerHTML = "";
                    document.getElementById("exam").innerHTML = "<h2>" + exam + " MCQ Result</h2>";
                    document.getElementById("participant").innerHTML = "<h3>Name: " + name + "</h3>";
                    document.getElementById("position").innerHTML = "<h4>Position: " + positions[name] + "/" + Object.keys(positions).length; + "</h4>";
                    document.getElementById("grade").innerHTML = "<h4>" + score + "</h4>\n";
                    document.getElementById("grade").innerHTML += "<font color='green'>" + correct + "</font><br>\n";
                    if (parseInt(wrong.split(":")[1]) !== 0) {
                        document.getElementById("grade").innerHTML += "<font color='red'>" + wrong + "</font><br>\n";
                        document.getElementById("grade").innerHTML += "<font color='red'>" + wrong_list_str + "</font><br>\n";
                    }
                    if (parseInt(unanswered.split(":")[1]) !== 0) {
                        document.getElementById("grade").innerHTML += "<font color='blue'>" + unanswered + "</font><br>\n";
                        document.getElementById("grade").innerHTML += "<font color='blue'>" + unanswered_list_str + "</font><br>\n";
                    }
                    if (parseInt(auto.split(":")[1]) !== 0) {
                        document.getElementById("grade").innerHTML += "<font color='green'>" + auto + "</font><br>\n";
                        document.getElementById("grade").innerHTML += "<font color='green'>" + auto_list_str + "</font><br><br>\n";
                    }
                    document.getElementById("omr").innerHTML = "<a href='" + name + ".jpg' download class='btn btn-primary'>Download OMR Sheet</a><br><br>\n<img src='vector_mcq_1_" + name + ".jpg'/>"
                } catch (e) {
                    document.getElementById("error").innerHTML = "<font color='red'>No such student exists!</font>";
                    document.getElementById("exam").innerHTML = "";
                    document.getElementById("participant").innerHTML = "";
                    document.getElementById("position").innerHTML = "";
                    document.getElementById("grade").innerHTML = "";
                    document.getElementById("omr").innerHTML = "";
                }
            }
